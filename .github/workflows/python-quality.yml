name: Python Code Quality

on:
  workflow_call:
    inputs:
      python-version:
        type: string
        default: "3.12"
      install-command:
        type: string
        required: true
      mypy-target:
        type: string
        required: true
      ruff-check:
        type: boolean
        default: false
      extra-test:
        description: "Optional test command (e.g., architecture tests)"
        type: string
        default: ""

jobs:
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ inputs.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip

      - name: Install dependencies
        run: ${{ inputs.install-command }}

      - name: Ruff lint
        if: inputs.ruff-check
        run: ruff check .

      - name: Ruff format check
        if: inputs.ruff-check
        run: ruff format --check .

      - name: Mypy
        run: mypy ${{ inputs.mypy-target }}

      - name: Extra tests
        if: inputs.extra-test != ''
        run: ${{ inputs.extra-test }}
