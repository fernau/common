name: Python Tests

on:
  workflow_call:
    inputs:
      install-command:
        type: string
        required: true
      unit-test-command:
        type: string
        required: true
      integration-test-command:
        description: "pytest command for integration tests (skipped if empty)"
        type: string
        default: ""
      apt-packages:
        description: "Space-separated system packages to install via apt-get"
        type: string
        default: ""
      pre-test-command:
        description: >-
          Shell command to run after dependency install but before any
          tests. Typical use: build or pull a Docker image used by
          integration tests, seed test data, warm caches. Skipped if empty.
        type: string
        default: ""

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system packages
        if: inputs.apt-packages != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ inputs.apt-packages }}

      - name: Install dependencies
        run: ${{ inputs.install-command }}

      - name: Pre-test command
        if: inputs.pre-test-command != ''
        # GITHUB_TOKEN and GITHUB_ACTOR are exported so the command can
        # `docker login ghcr.io`, gh-api call, etc. without the caller
        # passing secrets through `with:` (which GHA rejects at parse
        # time because inputs are evaluated before secrets are resolved).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: ${{ inputs.pre-test-command }}

      - name: Run unit tests
        run: ${{ inputs.unit-test-command }}

      - name: Run integration tests
        if: inputs.integration-test-command != ''
        run: ${{ inputs.integration-test-command }}
